browser:
  user_data_dir: "../weibo_user_data"
  browser_channel: "chrome"
  headless: false
  viewport_width: 1280
  viewport_height: 800
  initial_load_timeout_seconds: 0
  keep_open: false

chat:
  url: "https://api.weibo.com/chat/#/chat?check_gid=4761715839862414&source_from=11"
  api_url_base: "https://api.weibo.com/webim/groupchat/query_messages.json"
  group_id: "4761715839862414"
  source: "209678993"
  batch_size: 20
  history_fetch_timeout_seconds: 20
  image_response_timeout_seconds: 15
  direct_download_timeout_seconds: 15
  retry_delay_milliseconds: 5000
  history_interval_milliseconds: 1500

output:
  # 程序会在该路径所在目录下按天生成 YYYY-MM-DD.jsonl
  history_file: "clean_history"
  media_dir: "media_downloads"

state:
  state_file: "group_chat_state.json"

filters:
  target_senders:
    - "germer_123"

local_history_push:
  start_date: ""
  end_date: ""
  max_records: 0

stop_condition:
  enabled: true
  target_time: ""
  target_sender: "Bonoboooo"
  target_message: "内存这么快就跌了吗？我原本还在等长鑫上市集资大规模扩产卷出国际价格下跌才买几条内存呢…"

telegram:
  bot_token: "YOUR_BOT_TOKEN"
  chat_id: "-1001234567890"
  message_thread_id: 0
  direct_messages_topic_id: 0
  enabled: false
  timeout_seconds: 30

log:
  level: "info"
