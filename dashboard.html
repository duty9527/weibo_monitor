<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微博群聊数据看板</title>
    <meta name="description" content="微博群聊数据可视化分析看板 - 活跃度、话题趋势、用户排名">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.8);
            --bg-card-hover: rgba(30, 41, 59, 0.9);
            --border-color: rgba(99, 102, 241, 0.15);
            --border-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-1: #6366f1;
            --accent-2: #8b5cf6;
            --accent-3: #ec4899;
            --accent-4: #06b6d4;
            --accent-5: #10b981;
            --accent-6: #f59e0b;
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #ec4899, #f43f5e);
            --gradient-3: linear-gradient(135deg, #06b6d4, #0ea5e9);
            --gradient-4: linear-gradient(135deg, #10b981, #34d399);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0 32px;
            position: relative;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
        }

        /* Overview Cards */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-card);
        }

        .stat-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
            box-shadow: var(--shadow-card), var(--shadow-glow);
        }

        .stat-card .icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 16px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -1px;
        }

        .stat-card .label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 400;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 100px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.15;
            pointer-events: none;
        }

        .stat-card:nth-child(1) .icon { background: var(--gradient-1); }
        .stat-card:nth-child(1)::after { background: var(--accent-1); }
        .stat-card:nth-child(2) .icon { background: var(--gradient-2); }
        .stat-card:nth-child(2)::after { background: var(--accent-3); }
        .stat-card:nth-child(3) .icon { background: var(--gradient-3); }
        .stat-card:nth-child(3)::after { background: var(--accent-4); }
        .stat-card:nth-child(4) .icon { background: var(--gradient-4); }
        .stat-card:nth-child(4)::after { background: var(--accent-5); }

        /* Section Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .dashboard-grid.full {
            grid-template-columns: 1fr;
        }

        .dashboard-grid.triple {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--border-glow);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Charts */
        .chart-container {
            position: relative;
            width: 100%;
        }

        /* Word Cloud */
        #wordcloud-canvas {
            width: 100%;
            height: 400px;
        }

        /* User Ranking */
        .user-list {
            list-style: none;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            transition: background 0.2s;
            gap: 12px;
        }

        .user-item:hover {
            background: rgba(99, 102, 241, 0.08);
        }

        .user-rank {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .user-rank.gold { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #000; }
        .user-rank.silver { background: linear-gradient(135deg, #94a3b8, #cbd5e1); color: #000; }
        .user-rank.bronze { background: linear-gradient(135deg, #d97706, #f59e0b); color: #000; }
        .user-rank.normal { background: rgba(99, 102, 241, 0.15); color: var(--text-secondary); }

        .user-name {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .user-bar-wrap {
            width: 100px;
            height: 6px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .user-bar {
            height: 100%;
            border-radius: 3px;
            background: var(--gradient-1);
            transition: width 0.8s ease;
        }

        /* Emoji Grid */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .emoji-item {
            background: rgba(99, 102, 241, 0.06);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            transition: all 0.2s;
        }

        .emoji-item:hover {
            border-color: var(--accent-2);
            transform: scale(1.03);
        }

        .emoji-item .emoji-name {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .emoji-item .emoji-count {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 28px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-1), var(--accent-3), var(--accent-4));
            border-radius: 1px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .timeline-item:hover {
            border-color: var(--accent-2);
            background: rgba(99, 102, 241, 0.08);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-1);
            border: 2px solid var(--bg-primary);
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .timeline-date {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-4);
        }

        .timeline-badge {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(236, 72, 153, 0.15);
            color: var(--accent-3);
            font-weight: 500;
        }

        .timeline-messages {
            list-style: none;
        }

        .timeline-msg {
            padding: 6px 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(99, 102, 241, 0.05);
        }

        .timeline-msg:last-child { border: none; }

        .timeline-msg .msg-sender {
            color: var(--accent-2);
            font-weight: 500;
            margin-right: 6px;
        }

        /* Nav Tabs */
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 8px 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab-btn:hover {
            border-color: var(--accent-1);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--gradient-1);
            border-color: transparent;
            color: white;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 20px;
        }

        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top: 3px solid var(--accent-1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 3px; }

        /* Responsive */
        @media (max-width: 1024px) {
            .overview-grid { grid-template-columns: repeat(2, 1fr); }
            .dashboard-grid { grid-template-columns: 1fr; }
            .dashboard-grid.triple { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            .overview-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
            .container { padding: 12px; }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card .scrollable {
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">加载数据中...</div>
        </div>
    </div>

    <script>
    // ============ 加载数据并渲染 ============
    async function loadData() {
        const resp = await fetch('dashboard_data.json');
        const data = await resp.json();
        renderDashboard(data);
    }

    function formatNumber(n) {
        if (n >= 10000) return (n / 10000).toFixed(1) + '万';
        return n.toLocaleString();
    }

    function renderDashboard(data) {
        const app = document.getElementById('app');
        const ov = data.overview;

        app.innerHTML = `
        <header class="header fade-in">
            <h1>📊 微博群聊数据看板</h1>
            <p class="subtitle">${ov.date_start} 至 ${ov.date_end} · 共 ${ov.total_days} 天</p>
        </header>

        <!-- Overview -->
        <div class="overview-grid fade-in" style="animation-delay:0.1s">
            <div class="stat-card">
                <div class="icon">💬</div>
                <div class="value">${formatNumber(ov.total_messages)}</div>
                <div class="label">总消息数</div>
            </div>
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="value">${formatNumber(ov.total_users)}</div>
                <div class="label">参与用户</div>
            </div>
            <div class="stat-card">
                <div class="icon">📅</div>
                <div class="value">${ov.total_days}</div>
                <div class="label">活跃天数</div>
            </div>
            <div class="stat-card">
                <div class="icon">📈</div>
                <div class="value">${formatNumber(ov.avg_daily_msgs)}</div>
                <div class="label">日均消息</div>
            </div>
        </div>

        <!-- Daily Messages Chart + Message Type -->
        <div class="dashboard-grid fade-in" style="animation-delay:0.2s">
            <div class="card">
                <div class="card-title"><span class="dot" style="background:var(--accent-1)"></span>每日消息量趋势</div>
                <div class="tab-nav">
                    <button class="tab-btn active" onclick="switchDailyView('daily')">日</button>
                    <button class="tab-btn" onclick="switchDailyView('monthly')">月</button>
                </div>
                <div class="chart-container"><canvas id="dailyChart" height="280"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title"><span class="dot" style="background:var(--accent-3)"></span>消息类型分布</div>
                <div class="chart-container" style="max-width:320px;margin:0 auto"><canvas id="typeChart" height="280"></canvas></div>
            </div>
        </div>

        <!-- Hourly + Weekly -->
        <div class="dashboard-grid fade-in" style="animation-delay:0.3s">
            <div class="card">
                <div class="card-title"><span class="dot" style="background:var(--accent-4)"></span>24小时活跃分布</div>
                <div class="chart-container"><canvas id="hourlyChart" height="260"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title"><span class="dot" style="background:var(--accent-5)"></span>每周活跃分布</div>
                <div class="chart-container"><canvas id="weeklyChart" height="260"></canvas></div>
            </div>
        </div>

        <!-- Word Cloud + Top Users -->
        <div class="dashboard-grid fade-in" style="animation-delay:0.4s">
            <div class="card">
                <div class="card-title"><span class="dot" style="background:var(--accent-2)"></span>高频词云</div>
                <canvas id="wordcloud-canvas" width="600" height="400"></canvas>
            </div>
            <div class="card">
                <div class="card-title"><span class="dot" style="background:var(--accent-6)"></span>用户活跃排名 Top 30</div>
                <div class="scrollable">
                    <ul class="user-list" id="userList"></ul>
                </div>
            </div>
        </div>

        <!-- Emoji -->
        <div class="dashboard-grid full fade-in" style="animation-delay:0.5s">
            <div class="card">
                <div class="card-title"><span class="dot" style="background:var(--accent-3)"></span>热门表情 Top 20</div>
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="dashboard-grid full fade-in" style="animation-delay:0.6s">
            <div class="card">
                <div class="card-title"><span class="dot" style="background:var(--accent-4)"></span>🔥 热门讨论时刻</div>
                <div class="timeline" id="timeline"></div>
            </div>
        </div>
        `;

        // Render charts
        renderDailyChart(data);
        renderTypeChart(data);
        renderHourlyChart(data);
        renderWeeklyChart(data);
        renderWordCloud(data);
        renderUserList(data);
        renderEmojiGrid(data);
        renderTimeline(data);

        // Store data globally for tab switching
        window.__dashData = data;
    }

    // ============ Chart.js 全局配置 ============
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = "'Inter', 'Noto Sans SC', sans-serif";
    Chart.defaults.plugins.legend.labels.usePointStyle = true;

    let dailyChartInstance = null;

    function renderDailyChart(data) {
        const ctx = document.getElementById('dailyChart').getContext('2d');
        const daily = data.daily_messages;

        // 采样：如果数据点太多，按周聚合
        let labels, values, dauValues;
        if (daily.length > 90) {
            // 按周聚合
            const weekly = {};
            const weeklyDau = {};
            daily.forEach(d => {
                const dt = new Date(d.date);
                const weekStart = new Date(dt);
                weekStart.setDate(dt.getDate() - dt.getDay());
                const key = weekStart.toISOString().slice(0, 10);
                weekly[key] = (weekly[key] || 0) + d.count;
                weeklyDau[key] = Math.max(weeklyDau[key] || 0, d.active_users);
            });
            labels = Object.keys(weekly).sort();
            values = labels.map(k => weekly[k]);
            dauValues = labels.map(k => weeklyDau[k]);
        } else {
            labels = daily.map(d => d.date);
            values = daily.map(d => d.count);
            dauValues = daily.map(d => d.active_users);
        }

        dailyChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '消息量',
                    data: values,
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    borderWidth: 2,
                }, {
                    label: '活跃用户',
                    data: dauValues,
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    borderWidth: 2,
                    yAxisID: 'y1',
                }]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { position: 'top' } },
                scales: {
                    x: { grid: { color: 'rgba(99,102,241,0.06)' }, ticks: { maxTicksLimit: 12, font: { size: 11 } } },
                    y: { grid: { color: 'rgba(99,102,241,0.06)' }, ticks: { font: { size: 11 } } },
                    y1: { position: 'right', grid: { display: false }, ticks: { font: { size: 11 } } },
                }
            }
        });
    }

    function switchDailyView(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        const data = window.__dashData;
        if (dailyChartInstance) dailyChartInstance.destroy();

        const ctx = document.getElementById('dailyChart').getContext('2d');
        let labels, values;

        if (mode === 'monthly') {
            labels = data.monthly_messages.map(m => m.month);
            values = data.monthly_messages.map(m => m.count);
        } else {
            const daily = data.daily_messages;
            if (daily.length > 90) {
                const weekly = {};
                daily.forEach(d => {
                    const dt = new Date(d.date);
                    const ws = new Date(dt); ws.setDate(dt.getDate() - dt.getDay());
                    const key = ws.toISOString().slice(0, 10);
                    weekly[key] = (weekly[key] || 0) + d.count;
                });
                labels = Object.keys(weekly).sort();
                values = labels.map(k => weekly[k]);
            } else {
                labels = daily.map(d => d.date);
                values = daily.map(d => d.count);
            }
        }

        dailyChartInstance = new Chart(ctx, {
            type: mode === 'monthly' ? 'bar' : 'line',
            data: {
                labels, datasets: [{
                    label: '消息量', data: values,
                    borderColor: '#6366f1',
                    backgroundColor: mode === 'monthly' ? 'rgba(99,102,241,0.6)' : 'rgba(99,102,241,0.1)',
                    fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2,
                    borderRadius: mode === 'monthly' ? 6 : 0,
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: 'rgba(99,102,241,0.06)' }, ticks: { font: { size: 11 } } },
                    y: { grid: { color: 'rgba(99,102,241,0.06)' }, ticks: { font: { size: 11 } } },
                }
            }
        });
    }

    function renderTypeChart(data) {
        const ctx = document.getElementById('typeChart').getContext('2d');
        const typeNames = { text: '文本', image: '图片', link: '链接', retracted: '撤回', at_mention: '@提及', system: '系统', empty: '空' };
        const colors = ['#6366f1', '#ec4899', '#06b6d4', '#f59e0b', '#10b981', '#94a3b8', '#64748b'];

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: data.msg_type_distribution.map(d => typeNames[d.type] || d.type),
                datasets: [{
                    data: data.msg_type_distribution.map(d => d.count),
                    backgroundColor: colors,
                    borderWidth: 0,
                    hoverOffset: 8,
                }]
            },
            options: {
                responsive: true,
                cutout: '65%',
                plugins: {
                    legend: { position: 'bottom', labels: { padding: 16, font: { size: 12 } } },
                }
            }
        });
    }

    function renderHourlyChart(data) {
        const ctx = document.getElementById('hourlyChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.hourly_distribution.map(d => d.hour + ':00'),
                datasets: [{
                    label: '消息数',
                    data: data.hourly_distribution.map(d => d.count),
                    backgroundColor: data.hourly_distribution.map((d, i) => {
                        const intensity = d.count / Math.max(...data.hourly_distribution.map(x => x.count));
                        return `rgba(99, 102, 241, ${0.3 + intensity * 0.7})`;
                    }),
                    borderRadius: 4,
                    borderWidth: 0,
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: 10 } } },
                    y: { grid: { color: 'rgba(99,102,241,0.06)' }, ticks: { font: { size: 11 } } },
                }
            }
        });
    }

    function renderWeeklyChart(data) {
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        const colors = ['#6366f1', '#8b5cf6', '#a78bfa', '#ec4899', '#f43f5e', '#06b6d4', '#0ea5e9'];
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.weekly_distribution.map(d => d.name),
                datasets: [{
                    label: '消息数',
                    data: data.weekly_distribution.map(d => d.count),
                    backgroundColor: colors,
                    borderRadius: 6,
                    borderWidth: 0,
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false } },
                    y: { grid: { color: 'rgba(99,102,241,0.06)' }, ticks: { font: { size: 11 } } },
                }
            }
        });
    }

    function renderWordCloud(data) {
        const canvas = document.getElementById('wordcloud-canvas');
        if (!data.word_cloud || data.word_cloud.length === 0) {
            canvas.parentElement.innerHTML += '<p style="text-align:center;color:var(--text-muted)">暂无词云数据</p>';
            return;
        }
        const maxCount = data.word_cloud[0].count;
        const list = data.word_cloud.map(w => [w.word, Math.max(12, Math.round(w.count / maxCount * 80))]);

        WordCloud(canvas, {
            list: list,
            gridSize: 8,
            weightFactor: 1,
            fontFamily: 'Noto Sans SC, sans-serif',
            color: function(word, weight) {
                const colors = ['#6366f1', '#8b5cf6', '#a78bfa', '#ec4899', '#06b6d4', '#10b981', '#f59e0b', '#f43f5e'];
                return colors[Math.floor(Math.random() * colors.length)];
            },
            backgroundColor: 'transparent',
            rotateRatio: 0.3,
            shuffle: true,
        });
    }

    function renderUserList(data) {
        const ul = document.getElementById('userList');
        const maxCount = data.top_users[0]?.count || 1;
        ul.innerHTML = data.top_users.slice(0, 30).map((u, i) => {
            let rankClass = 'normal';
            if (i === 0) rankClass = 'gold';
            else if (i === 1) rankClass = 'silver';
            else if (i === 2) rankClass = 'bronze';
            const barWidth = Math.round(u.count / maxCount * 100);
            return `
                <li class="user-item">
                    <span class="user-rank ${rankClass}">${i + 1}</span>
                    <span class="user-name" title="${u.name}">${u.name}</span>
                    <span class="user-count">${formatNumber(u.count)}</span>
                    <div class="user-bar-wrap"><div class="user-bar" style="width:${barWidth}%"></div></div>
                </li>`;
        }).join('');
    }

    function renderEmojiGrid(data) {
        const grid = document.getElementById('emojiGrid');
        grid.innerHTML = data.top_emojis.slice(0, 20).map(e => `
            <div class="emoji-item">
                <div class="emoji-name">[${e.emoji}]</div>
                <div class="emoji-count">${formatNumber(e.count)} 次</div>
            </div>
        `).join('');
    }

    function renderTimeline(data) {
        const tl = document.getElementById('timeline');
        if (!data.hot_discussions || data.hot_discussions.length === 0) {
            tl.innerHTML = '<p style="color:var(--text-muted)">暂无热门讨论数据</p>';
            return;
        }
        tl.innerHTML = data.hot_discussions.slice(0, 20).map(h => `
            <div class="timeline-item">
                <div class="timeline-header">
                    <span class="timeline-date">${h.date} ${h.hour}:00 ~ ${h.hour + 1}:00</span>
                    <span class="timeline-badge">${h.count} 条消息</span>
                </div>
                <ul class="timeline-messages">
                    ${h.samples.map(s => `
                        <li class="timeline-msg">
                            <span class="msg-sender">${s.sender}</span>${s.message}
                        </li>
                    `).join('')}
                </ul>
            </div>
        `).join('');
    }

    // 启动
    loadData().catch(err => {
        document.getElementById('app').innerHTML = `
            <div class="loading">
                <p class="loading-text" style="color:#f43f5e">加载失败: ${err.message}</p>
                <p class="loading-text">请确保 dashboard_data.json 存在于同目录下</p>
            </div>`;
    });
    </script>
</body>
</html>
